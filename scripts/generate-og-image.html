<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Source+Serif+4:opsz,wght@8..60,400&family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px;
      height: 630px;
      background: #0E0E12;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .top-accent {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: #7B93C4;
      opacity: 0.3;
    }

    .wordmark {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 600;
      font-size: 88px;
      letter-spacing: -2px;
      color: #E8E5DF;
      margin-bottom: 20px;
    }

    .wordmark .accent {
      color: #7B93C4;
    }

    .tagline {
      font-family: 'Source Serif 4', Georgia, serif;
      font-weight: 400;
      font-size: 28px;
      color: #9A978F;
      margin-bottom: 40px;
    }

    .divider {
      width: 160px;
      height: 1px;
      background: #2A2A32;
      margin-bottom: 40px;
    }

    .metrics {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 0;
    }

    .metric {
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 400;
      font-size: 20px;
      color: #7B93C4;
    }

    .dot {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 20px;
      color: #807E77;
    }

    .domain {
      position: absolute;
      bottom: 50px;
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 400;
      font-size: 18px;
      color: #807E77;
    }
  </style>
</head>
<body>
  <div class="top-accent"></div>
  <div class="wordmark">Astro<span class="accent">LLM</span></div>
  <div class="tagline">A domain-specialized language model for astronomy and astrophysics</div>
  <div class="divider"></div>
  <div class="metrics">
    <span class="metric">15M+ papers</span>
    <span class="dot">&middot;</span>
    <span class="metric">20.5M objects</span>
    <span class="dot">&middot;</span>
    <span class="metric">5,700+ exoplanets</span>
  </div>
  <div class="domain">astrollm.org</div>
</body>
</html>
